<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery - Ideal Landscape Services</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .gallery-page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .gallery-page h1 {
      font-size: 36px;
      margin-bottom: 12px;
      color: #2c3e50;
    }
    .gallery-page .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 48px;
    }
  </style>
</head>
<body>
  <div class="gallery-page">
    <h1>Image Gallery</h1>
    <p class="subtitle">Search through our portfolio of landscape projects by keyword</p>
    
    <!-- Search component will be inserted here -->
    <div id="image-search"></div>
  </div>

  <!-- Firebase & Search -->
  <script type="module">
    import { createImageSearch } from '/js/image-search.js';

    // Initialize search when page loads
    document.addEventListener('DOMContentLoaded', async () => {
      const searchAPI = await createImageSearch({
        containerId: 'image-search',
        showSearch: true,
        showCategoryFilter: true,
        showBeforeAfter: true,
        columnsDesktop: 4,
        columnsTablet: 3,
        columnsMobile: 2,
        enableLightbox: true,
        placeholder: 'Search by keyword (e.g., patio, roses, pergola)...'
      });

      // Optional: Add refresh button
      console.log('Image search ready. Use searchAPI.refresh() or searchAPI.reload()');
    });
  </script>
</body>
</html>
