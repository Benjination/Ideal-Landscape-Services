name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Copy root /images/ subfolders into Website/Actual/images/ so that all
      # depth-relative paths (images/*, ../images/*, ../../images/*) resolve once
      # GitHub Pages serves Website/Actual/ as the site root.
      # -n prevents overwriting logo.png that lives in Actual/images/.
      - name: Copy project images into site directory
        run: cp -rn images/. "Website/Actual/images/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Website/Actual"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
